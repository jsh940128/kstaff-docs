<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="64" height="64" rx="13" fill="url(#g)"/>
  <!-- K — vertical stem -->
  <line x1="16" y1="13" x2="16" y2="51"
        stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <!-- K — upper diagonal -->
  <line x1="16" y1="32" x2="46" y2="13"
        stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <!-- K — lower diagonal -->
  <line x1="16" y1="32" x2="46" y2="51"
        stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <!-- accent dot at bottom-right tip -->
  <circle cx="46" cy="51" r="4.5" fill="#93c5fd"/>
</svg>